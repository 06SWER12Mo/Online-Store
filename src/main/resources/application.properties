# ============================================================
# SERVER CONFIGURATION
# ============================================================
server.port=8081
server.servlet.context-path=/

# ============================================================
# MYSQL DATABASE CONFIGURATION
# ============================================================
spring.datasource.url=jdbc:mysql://localhost:3306/storedb?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=

# ============================================================
# JPA / HIBERNATE
# ============================================================
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
# Changed from 'create-drop' to 'update' so your data persists when the server restarts
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true

# ============================================================
# JWT SECURITY - BOTH PROPERTIES INCLUDED
# ============================================================
app.jwt.secret=mySuperSecretKeyForJWTThatIsAtLeast32CharactersLong1234567890
app.jwt.expiration-ms=86400000
app.jwt.access-token-expiration=86400000
app.jwt.refresh-token-expiration=604800000
app.jwt.issuer=online-store-api

# ============================================================
# LOGGING
# ============================================================
logging.level.com.example.demo=DEBUG
logging.level.org.springframework.security=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# ============================================================
# SWAGGER / OPENAPI
# ============================================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.doc-expansion=none
springdoc.show-actuator=true

# ============================================================
# FILE UPLOAD
# ============================================================
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# ============================================================
# SHIPPING CONFIGURATION
# ============================================================

# Auto-deliver hours after dispatch (default: 5 hours)
shipping.auto-deliver-hours=5

# Enable scheduling
spring.task.scheduling.enabled=true