# ============================================================
# SERVER CONFIGURATION
# ============================================================
server.port=8081
server.servlet.context-path=/

# ============================================================
# H2 DATABASE CONFIGURATION
# ============================================================
spring.datasource.url=jdbc:h2:mem:store_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ============================================================
# H2 CONSOLE
# ============================================================
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# ============================================================
# JPA / HIBERNATE
# ============================================================
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true

# ============================================================
# JWT SECURITY - BOTH PROPERTIES INCLUDED
# ============================================================
app.jwt.secret=mySuperSecretKeyForJWTThatIsAtLeast32CharactersLong1234567890
app.jwt.expiration-ms=86400000
app.jwt.access-token-expiration=86400000
app.jwt.refresh-token-expiration=604800000
app.jwt.issuer=online-store-api

# ============================================================
# LOGGING
# ============================================================
logging.level.com.example.demo=DEBUG
logging.level.org.springframework.security=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# ============================================================
# SWAGGER / OPENAPI
# ============================================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.doc-expansion=none
springdoc.show-actuator=true

# ============================================================
# FILE UPLOAD
# ============================================================
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB